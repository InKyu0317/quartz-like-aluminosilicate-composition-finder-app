name: Sync to HF Spaces

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add hf https://ip278116:${HF_TOKEN}@huggingface.co/spaces/ip278116/quartz-like-aluminosilicate-composition-finder
          git push hf master:main --force
